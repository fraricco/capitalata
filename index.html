<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Capitalata - Quiz delle Capitali</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .app {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 720px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }
  h1 { text-align: center; margin-bottom: 8px; font-size: 2.4rem; }
  .subtitle { text-align: center; opacity: 0.8; margin-bottom: 24px; }
  .screen { display: none; }
  .screen.active { display: block; }
  label { display: block; margin: 12px 0 6px; font-weight: 600; }
  input[type="number"], input[type="text"], select {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    font-size: 1rem;
  }
  input::placeholder { color: rgba(255, 255, 255, 0.5); }
  button {
    background: #ffb347;
    color: #1e3c72;
    border: none;
    padding: 14px 24px;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 16px;
    transition: transform 0.1s, background 0.2s;
    width: 100%;
  }
  button:hover:not(:disabled) { background: #ffc46b; transform: translateY(-2px); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .player-inputs { display: grid; gap: 10px; margin-top: 12px; }
  .turn-banner {
    background: rgba(255, 179, 71, 0.2);
    border-left: 4px solid #ffb347;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 1.1rem;
  }
  .question {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 24px;
    text-align: center;
    line-height: 1.4;
  }
  .options { display: grid; gap: 12px; }
  .option {
    background: rgba(255, 255, 255, 0.1);
    border: 2px solid rgba(255, 255, 255, 0.2);
    color: #fff;
    text-align: left;
    padding: 14px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    margin: 0;
    width: 100%;
    font-weight: 500;
  }
  .option:hover:not(:disabled) {
    background: rgba(255, 255, 255, 0.2);
    border-color: #ffb347;
    transform: none;
  }
  .option.correct {
    background: rgba(46, 204, 113, 0.5);
    border-color: #2ecc71;
  }
  .option.wrong {
    background: rgba(231, 76, 60, 0.5);
    border-color: #e74c3c;
  }
  .feedback {
    text-align: center;
    margin-top: 18px;
    font-size: 1.1rem;
    min-height: 28px;
    font-weight: 600;
  }
  .scoreboard {
    background: rgba(0, 0, 0, 0.2);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 20px;
  }
  .scoreboard h3 { margin-bottom: 8px; font-size: 1rem; opacity: 0.9; }
  .score-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 0.95rem;
  }
  .score-row.active { color: #ffb347; font-weight: 700; }
  .progress {
    text-align: center;
    margin-bottom: 16px;
    opacity: 0.85;
    font-size: 0.95rem;
  }
  .ranking { list-style: none; padding: 0; }
  .ranking li {
    display: flex;
    justify-content: space-between;
    padding: 14px 18px;
    margin-bottom: 8px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    font-size: 1.1rem;
  }
  .ranking li:first-child {
    background: linear-gradient(90deg, rgba(255,215,0,0.3), rgba(255,179,71,0.2));
    border: 2px solid #ffd700;
    font-weight: 700;
    font-size: 1.25rem;
  }
  .winner-banner {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 20px;
    color: #ffd700;
  }
</style>
</head>
<body>
<div class="app">
  <h1>Capitalata</h1>
  <p class="subtitle">Il quiz multiplayer sulle capitali del mondo</p>

  <!-- Setup Screen -->
  <div id="setup" class="screen active">
    <label for="numPlayers">Numero di giocatori (2-6)</label>
    <input type="number" id="numPlayers" min="2" max="6" value="2" />

    <label for="numQuestions">Numero di domande per giocatore</label>
    <select id="numQuestions">
      <option value="5">5</option>
      <option value="10" selected>10</option>
      <option value="15">15</option>
      <option value="20">20</option>
    </select>

    <button id="confirmCount">Continua</button>
  </div>

  <!-- Names Screen -->
  <div id="names" class="screen">
    <p>Inserisci i nomi dei giocatori:</p>
    <div id="nameInputs" class="player-inputs"></div>
    <button id="startGame">Inizia il gioco</button>
  </div>

  <!-- Quiz Screen -->
  <div id="quiz" class="screen">
    <div class="scoreboard">
      <h3>Punteggi</h3>
      <div id="scoreList"></div>
    </div>
    <div class="progress" id="progress"></div>
    <div class="turn-banner" id="turnBanner"></div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button id="nextBtn" style="display:none;">Avanti</button>
  </div>

  <!-- Results Screen -->
  <div id="results" class="screen">
    <div class="winner-banner" id="winnerBanner"></div>
    <ol class="ranking" id="ranking"></ol>
    <button id="playAgain">Gioca di nuovo</button>
  </div>
</div>

<script>
const CAPITALS = [
  { country: "Italia", capital: "Roma" },
  { country: "Francia", capital: "Parigi" },
  { country: "Germania", capital: "Berlino" },
  { country: "Spagna", capital: "Madrid" },
  { country: "Portogallo", capital: "Lisbona" },
  { country: "Regno Unito", capital: "Londra" },
  { country: "Irlanda", capital: "Dublino" },
  { country: "Paesi Bassi", capital: "Amsterdam" },
  { country: "Belgio", capital: "Bruxelles" },
  { country: "Svizzera", capital: "Berna" },
  { country: "Austria", capital: "Vienna" },
  { country: "Grecia", capital: "Atene" },
  { country: "Svezia", capital: "Stoccolma" },
  { country: "Norvegia", capital: "Oslo" },
  { country: "Danimarca", capital: "Copenaghen" },
  { country: "Finlandia", capital: "Helsinki" },
  { country: "Polonia", capital: "Varsavia" },
  { country: "Repubblica Ceca", capital: "Praga" },
  { country: "Ungheria", capital: "Budapest" },
  { country: "Romania", capital: "Bucarest" },
  { country: "Bulgaria", capital: "Sofia" },
  { country: "Croazia", capital: "Zagabria" },
  { country: "Serbia", capital: "Belgrado" },
  { country: "Russia", capital: "Mosca" },
  { country: "Ucraina", capital: "Kiev" },
  { country: "Turchia", capital: "Ankara" },
  { country: "Stati Uniti", capital: "Washington" },
  { country: "Canada", capital: "Ottawa" },
  { country: "Messico", capital: "Città del Messico" },
  { country: "Brasile", capital: "Brasilia" },
  { country: "Argentina", capital: "Buenos Aires" },
  { country: "Cile", capital: "Santiago" },
  { country: "Perù", capital: "Lima" },
  { country: "Colombia", capital: "Bogotà" },
  { country: "Venezuela", capital: "Caracas" },
  { country: "Cuba", capital: "L'Avana" },
  { country: "Cina", capital: "Pechino" },
  { country: "Giappone", capital: "Tokyo" },
  { country: "Corea del Sud", capital: "Seul" },
  { country: "India", capital: "Nuova Delhi" },
  { country: "Pakistan", capital: "Islamabad" },
  { country: "Thailandia", capital: "Bangkok" },
  { country: "Vietnam", capital: "Hanoi" },
  { country: "Indonesia", capital: "Giacarta" },
  { country: "Filippine", capital: "Manila" },
  { country: "Australia", capital: "Canberra" },
  { country: "Nuova Zelanda", capital: "Wellington" },
  { country: "Egitto", capital: "Il Cairo" },
  { country: "Marocco", capital: "Rabat" },
  { country: "Sudafrica", capital: "Pretoria" },
  { country: "Nigeria", capital: "Abuja" },
  { country: "Kenya", capital: "Nairobi" },
  { country: "Etiopia", capital: "Addis Abeba" },
  { country: "Israele", capital: "Gerusalemme" },
  { country: "Arabia Saudita", capital: "Riad" },
  { country: "Iran", capital: "Teheran" },
  { country: "Iraq", capital: "Baghdad" }
];

const state = {
  players: [],
  questionsPerPlayer: 10,
  questions: [],
  currentIndex: 0,
  answered: false
};

const $ = (id) => document.getElementById(id);

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

function shuffle(array) {
  const a = [...array];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestion(playerIndex) {
  const correct = CAPITALS[Math.floor(Math.random() * CAPITALS.length)];
  const wrongs = shuffle(CAPITALS.filter(c => c.capital !== correct.capital)).slice(0, 3);
  const options = shuffle([correct, ...wrongs].map(c => c.capital));
  return {
    playerIndex,
    country: correct.country,
    correct: correct.capital,
    options
  };
}

$('confirmCount').addEventListener('click', () => {
  const n = parseInt($('numPlayers').value, 10);
  if (isNaN(n) || n < 2 || n > 6) {
    alert('Inserisci un numero tra 2 e 6');
    return;
  }
  state.questionsPerPlayer = parseInt($('numQuestions').value, 10);
  const container = $('nameInputs');
  container.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = `Nome giocatore ${i + 1}`;
    input.value = `Giocatore ${i + 1}`;
    input.dataset.idx = i;
    container.appendChild(input);
  }
  showScreen('names');
});

$('startGame').addEventListener('click', () => {
  const inputs = $('nameInputs').querySelectorAll('input');
  state.players = Array.from(inputs).map((inp, i) => ({
    name: inp.value.trim() || `Giocatore ${i + 1}`,
    score: 0
  }));
  state.questions = [];
  for (let q = 0; q < state.questionsPerPlayer; q++) {
    for (let p = 0; p < state.players.length; p++) {
      state.questions.push(buildQuestion(p));
    }
  }
  state.currentIndex = 0;
  showScreen('quiz');
  renderQuestion();
});

function renderScoreboard(activePlayerIdx) {
  const list = $('scoreList');
  list.innerHTML = '';
  state.players.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'score-row' + (i === activePlayerIdx ? ' active' : '');
    row.innerHTML = `<span>${p.name}</span><span>${p.score} pt</span>`;
    list.appendChild(row);
  });
}

function renderQuestion() {
  state.answered = false;
  const q = state.questions[state.currentIndex];
  renderScoreboard(q.playerIndex);
  $('progress').textContent = `Domanda ${state.currentIndex + 1} di ${state.questions.length}`;
  $('turnBanner').textContent = `Turno di ${state.players[q.playerIndex].name}`;
  $('question').textContent = `Qual è la capitale di ${q.country}?`;
  $('feedback').textContent = '';
  $('nextBtn').style.display = 'none';

  const opts = $('options');
  opts.innerHTML = '';
  q.options.forEach(option => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = option;
    btn.addEventListener('click', () => handleAnswer(btn, option, q));
    opts.appendChild(btn);
  });
}

function handleAnswer(btn, choice, q) {
  if (state.answered) return;
  state.answered = true;
  const buttons = $('options').querySelectorAll('.option');
  buttons.forEach(b => {
    b.disabled = true;
    if (b.textContent === q.correct) b.classList.add('correct');
  });
  if (choice === q.correct) {
    state.players[q.playerIndex].score++;
    $('feedback').textContent = `Esatto! +1 punto per ${state.players[q.playerIndex].name}`;
    $('feedback').style.color = '#2ecc71';
  } else {
    btn.classList.add('wrong');
    $('feedback').textContent = `Sbagliato! La risposta giusta era ${q.correct}`;
    $('feedback').style.color = '#e74c3c';
  }
  renderScoreboard(q.playerIndex);
  $('nextBtn').style.display = 'block';
}

$('nextBtn').addEventListener('click', () => {
  state.currentIndex++;
  if (state.currentIndex >= state.questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
});

function showResults() {
  const sorted = [...state.players].sort((a, b) => b.score - a.score);
  const winner = sorted[0];
  const tiedWinners = sorted.filter(p => p.score === winner.score);
  const banner = $('winnerBanner');
  if (tiedWinners.length > 1) {
    banner.textContent = `Pareggio tra: ${tiedWinners.map(p => p.name).join(', ')}`;
  } else {
    banner.textContent = `Vince ${winner.name} con ${winner.score} punti!`;
  }
  const ranking = $('ranking');
  ranking.innerHTML = '';
  sorted.forEach((p, i) => {
    const li = document.createElement('li');
    li.innerHTML = `<span>${i + 1}. ${p.name}</span><span>${p.score} pt</span>`;
    ranking.appendChild(li);
  });
  showScreen('results');
}

$('playAgain').addEventListener('click', () => {
  state.players = [];
  state.questions = [];
  state.currentIndex = 0;
  showScreen('setup');
});
</script>
</body>
</html>
